{% extends "base.html" %}
{% block title %}Login - Clinico{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-logo">
      <i class="fa-solid fa-stethoscope"></i>
      <h2>Welcome Back</h2>
      <p>Sign in to your Clinico account</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="role-tabs">
        <input type="radio" name="role" id="r-patient" value="patient" checked>
        <label for="r-patient"><i class="fa-solid fa-user"></i> Patient</label>
        <input type="radio" name="role" id="r-doctor" value="doctor">
        <label for="r-doctor"><i class="fa-solid fa-user-doctor"></i> Doctor</label>
        <input type="radio" name="role" id="r-admin" value="admin">
        <label for="r-admin"><i class="fa-solid fa-shield"></i> Admin</label>
      </div>

      <div class="form-group">
        <label>Email / Username</label>
        <div class="input-icon">
          <i class="fa-solid fa-envelope"></i>
          <input type="text" name="email" placeholder="Enter email or username" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-icon">
          <i class="fa-solid fa-lock"></i>
          <input type="password" name="password" placeholder="Enter password" required>
        </div>
      </div>

      <button type="submit" class="auth-btn">Sign In</button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
  </div>
</section>
{% endblock %}
