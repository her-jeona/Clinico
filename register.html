{% extends "base.html" %}
{% block title %}Register - Clinico{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card" style="max-width:560px;">
    <div class="auth-logo">
      <i class="fa-solid fa-user-plus"></i>
      <h2>Create Account</h2>
      <p>Join Clinico today</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" id="regForm">
      <!-- Role Selector -->
      <div class="role-tabs">
        <input type="radio" name="role" id="r-patient" value="patient" checked onchange="toggleDoctorFields()">
        <label for="r-patient"><i class="fa-solid fa-user"></i> Patient</label>
        <input type="radio" name="role" id="r-doctor" value="doctor" onchange="toggleDoctorFields()">
        <label for="r-doctor"><i class="fa-solid fa-user-doctor"></i> Doctor</label>
      </div>

      <!-- Common Fields -->
      <div class="form-row-2">
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-icon"><i class="fa-solid fa-user"></i>
            <input type="text" name="name" placeholder="Full name" required>
          </div>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <div class="input-icon"><i class="fa-solid fa-phone"></i>
            <input type="tel" name="phone" placeholder="Phone number">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <div class="input-icon"><i class="fa-solid fa-envelope"></i>
          <input type="email" name="email" placeholder="Email address" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-icon"><i class="fa-solid fa-lock"></i>
          <input type="password" name="password" placeholder="Create password" required minlength="6">
        </div>
      </div>

      <!-- Doctor-only Fields -->
      <div id="doctorFields" style="display:none;">
        <hr style="margin:20px 0; border-color:#e0e0e0;">
        <p style="color:#0aa7a7;font-weight:600;margin-bottom:15px;">Professional Details</p>
        <div class="form-row-2">
          <div class="form-group">
            <label>Specialization</label>
            <div class="input-icon"><i class="fa-solid fa-stethoscope"></i>
              <select name="specialization" style="width:100%;padding:10px 10px 10px 40px;border:1px solid #ddd;border-radius:6px;outline:none;">
                <option value="">Select Specialization</option>
                <option>Cardiology</option>
                <option>Neurology</option>
                <option>Pediatrics</option>
                <option>ENT</option>
                <option>Dental</option>
                <option>Orthopedics</option>
                <option>Dermatology</option>
                <option>Ophthalmology</option>
                <option>General Medicine</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Consultation Fees (₹)</label>
            <div class="input-icon"><i class="fa-solid fa-indian-rupee-sign"></i>
              <input type="number" name="fees" placeholder="e.g. 500" min="0">
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Contact Number</label>
          <div class="input-icon"><i class="fa-solid fa-phone"></i>
            <input type="tel" name="contact_no" placeholder="Professional contact">
          </div>
        </div>
        <div class="info-note"><i class="fa-solid fa-circle-info"></i> Doctor accounts require admin approval before login.</div>
      </div>

      <button type="submit" class="auth-btn">Create Account</button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
  </div>
</section>

{% block scripts %}
<script>
function toggleDoctorFields() {
  const isDoctor = document.getElementById('r-doctor').checked;
  document.getElementById('doctorFields').style.display = isDoctor ? 'block' : 'none';
}
</script>
{% endblock %}
{% endblock %}
